name: NHRP Packet Analysis
description: NHRP (Next Hop Resolution Protocol) packet analysis for DMVPN/mGRE tunnel troubleshooting
protocol_key: nhrp
display_filter: nhrp
fields:
- label: Frame Number
  tshark_field: frame.number
  description: Packet sequence number in capture
- label: NHRP Version
  tshark_field: nhrp.hdr.version
  description: NHRP version (usually 1 for draft, 2 for RFC)
- label: Packet Type
  tshark_field: nhrp.hdr.op.type
  description: 'NHRP packet type: 1=Resolution Request, 2=Resolution Reply, 3=Registration Request, etc.'
- label: Address Family
  tshark_field: nhrp.hdr.afn
  description: 'Address family number: 1=IPv4, 2=IPv6'
- label: Hop Count
  tshark_field: nhrp.hdr.hopcnt
  description: Number of next hops
- label: Packet Length
  tshark_field: nhrp.hdr.pktsz
  description: NHRP packet length
- label: Checksum
  tshark_field: nhrp.hdr.chksum
  description: NHRP checksum
- label: Checksum Status
  tshark_field: nhrp.hdr.chksum.status
  description: Checksum verification status
- label: Extension Offset
  tshark_field: nhrp.hdr.extoff
  description: Extension offset
- label: Flags
  tshark_field: nhrp.flags
  description: NHRP flags
- label: Authoritative
  tshark_field: nhrp.flag.a
  description: Authoritative flag
- label: Stable Binding
  tshark_field: nhrp.flag.s
  description: Stable binding flag
- label: Request ID
  tshark_field: nhrp.reqid
  description: NHRP request identifier
- label: Source NBMA Address
  tshark_field: nhrp.src.nbma.addr
  description: Source NBMA (tunnel) address
- label: Source Protocol Address
  tshark_field: nhrp.src.prot.addr
  description: Source protocol (tunnel inner) address
- label: Destination Protocol Address (IPv6)
  tshark_field: nhrp.dst.prot.addr.ipv6
  description: Destination protocol address (IPv6)
- label: Destination Protocol Address
  tshark_field: nhrp.dst.prot.addr
  description: Destination protocol address
filter_examples:
- name: NHRP Resolution Request
  filter: nhrp.hdr.op.type == 1
  description: Filter for NHRP Resolution Request
- name: NHRP Resolution Reply
  filter: nhrp.hdr.op.type == 2
  description: Filter for NHRP Resolution Reply
- name: NHRP Registration Request
  filter: nhrp.hdr.op.type == 3
  description: Filter for NHRP Registration Request
- name: NHRP Registration Reply
  filter: nhrp.hdr.op.type == 4
  description: Filter for NHRP Registration Reply
- name: NHRP Purge Request
  filter: nhrp.hdr.op.type == 5
  description: Filter for NHRP Purge Request
- name: NHRP Error Indication
  filter: nhrp.hdr.op.type == 8
  description: Filter for NHRP Error Indication
checks:
- name: nhrp_registration_timeout
  severity: major
  message: 'NHRP registration timeout: spoke {nhrp.src.prot.addr} not registered'
  description: No NHRP Registration Reply within expected time
  condition: null
- name: nhrp_resolution_failure
  severity: major
  message: 'NHRP resolution failure: no path to {nhrp.dst.prot.addr}'
  description: nhrp.hdr.op.type == 2 with error code
  condition: nhrp.hdr.op.type == 2
- name: nhrp_spoke_to_spoke_failed
  severity: minor
  message: 'NHRP spoke-to-spoke tunnel failed: NHRP purge for {nhrp.dst.prot.addr}'
  condition: nhrp.hdr.op.type == 5
- name: nhrp_shortcut_timeout
  severity: minor
  message: 'NHRP shortcut timeout: {nhrp.dst.prot.addr} reverted to NHC'
  description: NHRP purge without re-registration
  condition: null
