name: EAPoL Packet Analysis
description: EAPoL (Extensible Authentication Protocol over LAN) packet analysis for 802.1X authentication troubleshooting
protocol_key: eapol
display_filter: eapol
fields:
- label: Frame Number
  tshark_field: frame.number
  description: Packet sequence number in capture
- label: Version
  tshark_field: eapol.version
  description: EAPoL version (usually 1 or 2)
- label: Type
  tshark_field: eapol.type
  description: 'EAPoL packet type: 0=EAP Packet, 1=EAPOL Start, 2=EAPOL Logoff, 3=EAPOL Key'
- label: Length
  tshark_field: eapol.len
  description: EAPoL packet length
- label: Key Descriptor Type
  tshark_field: eapol.keydes.type
  description: EAPoL Key descriptor type
- label: Key Length
  tshark_field: eapol.keydes.key_len
  description: Key length in bytes
- label: Replay Counter
  tshark_field: eapol.keydes.replay_counter
  description: Replay counter for key descriptor
- label: Key IV
  tshark_field: eapol.keydes.key_iv
  description: Key initialization vector
- label: Key Index
  tshark_field: eapol.keydes.key_index
  description: Key index (with type flag)
- label: Key Signature
  tshark_field: eapol.keydes.key_signature
  description: Key signature
- label: Key
  tshark_field: eapol.keydes.key
  description: Key data
filter_examples:
- name: EAPoL Start
  filter: eapol.type == 1
  description: Filter for EAPoL Start
- name: EAPoL Logoff
  filter: eapol.type == 2
  description: Filter for EAPoL Logoff
- name: EAPoL Packet
  filter: eapol.type == 0
  description: Filter for EAPoL EAP packets
- name: EAPoL Key
  filter: eapol.type == 3
  description: Filter for EAPoL Key frames
- name: EAPoL Key Message 1
  filter: eapol.keydes.type == 1
  description: Filter for EAPoL Key message 1
- name: EAPoL Key Message 4
  filter: eapol.keydes.type == 4
  description: Filter for EAPoL Key message 4 (final)
checks:
- name: eapol_timeout
  severity: major
  message: 'EAPoL authentication timeout: no response from {eth.dst}'
  description: eapol.type == 1 (Start) and no matching response within expected time
  condition: eapol.type == 1
- name: eapol_logoff
  severity: major
  message: 'EAPoL logoff: client {eth.src} disconnected'
  condition: eapol.type == 2
- name: eapol_key_mismatch
  severity: major
  message: 'EAPoL key mismatch: replay counter {eapol.keydes.replay_counter}'
  description: eapol.keydes.replay_counter not monotonically increasing
  condition: null
- name: eapol_4wayshake_incomplete
  severity: major
  message: 'EAPoL 4-way handshake incomplete: missing message 4'
  description: eapol.keydes.type == 3 but no eapol.keydes.type == 4 received
  condition: eapol.keydes.type == 3
