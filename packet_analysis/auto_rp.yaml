name: "Auto-RP Packet Analysis"
description: "Auto-RP (Auto-Rendezvous Point) packet analysis for Cisco multicast RP discovery"

# Protocol identifier - LLM uses this to query the protocol definition
protocol_key: "auto_rp"

# tshark display filter - used for -Y parameter
display_filter: "autorp"

# tshark fields that LLM can use for analysis
fields:
  - label: "Frame Number"
    tshark_field: "frame.number"
    description: "Packet sequence number in capture"

  - label: "RP Address"
    tshark_field: "autorp.rp_addr"
    description: "RP address announced"

  - label: "Group Address"
    tshark_field: "autorp.group_addr"
    description: "Group range address"

  - label: "Group Mask"
    tshark_field: "autorp.group_mask"
    description: "Group range mask"

  - label: "Type"
    tshark_field: "autorp.type"
    description: "Auto-RP type: 0=RP-Announce, 1=RP-Discovery"

filter_examples:
  - name: "Auto-RP Announce"
    filter: "autorp.type == 0"
    description: "Filter for RP-Announce messages"

  - name: "Auto-RP Discovery"
    filter: "autorp.type == 1"
    description: "Filter for RP-Discovery messages"

  - name: "Specific RP"
    filter: "autorp.rp_addr == 10.1.1.1"
    description: "Filter for specific RP address"

checks:
  - name: "autor_rp_spoof"
    severity: major
    message: "Auto-RP spoofing: unauthorized RP {autorp.rp_addr} announced"
    condition: "Auto-RP announcement from unexpected source"

  - name: "autor_same_rp_announce"
    severity: minor
    message: "Auto-RP duplicate RP: {autorp.rp_addr} announced by multiple sources"
    condition: "Same autorp.rp_addr from different sources"
