name: LLC Packet Analysis
description: LLC (Logical Link Control) packet analysis for IEEE 802.2 network layer interfacing
protocol_key: llc
display_filter: llc
fields:
- label: Frame Number
  tshark_field: frame.number
  description: Packet sequence number in capture
- label: DSAP
  tshark_field: llc.dsap
  description: Destination Service Access Point
- label: DSAP IG
  tshark_field: llc.dsap.ig
  description: DSAP Individual/Group flag
- label: SSAP
  tshark_field: llc.ssap
  description: Source Service Access Point
- label: SSAP CR
  tshark_field: llc.ssap.cr
  description: SSAP Command/Response flag
- label: Control Field
  tshark_field: llc.control
  description: LLC control field
- label: Frame Type
  tshark_field: llc.control.ftype
  description: 'Frame type: 1=I (Information), 2=S (Supervisory), 3=U (Unnumbered)'
- label: N(R)
  tshark_field: llc.control.n_r
  description: Receive sequence number
- label: N(S)
  tshark_field: llc.control.n_s
  description: Send sequence number
- label: Poll/Final
  tshark_field: llc.control.p
  description: Poll/Final bit
filter_examples:
- name: SNAP Protocol
  filter: llc.dsap == 0xAA and llc.ssap == 0xAA
  description: Filter for SNAP (Subnetwork Access Protocol)
- name: STP (spanning tree)
  filter: llc.dsap == 0x42
  description: Filter for STP BPDUs via DSAP 0x42
- name: I-frame
  filter: llc.control.ftype == 1
  description: Filter for LLC I-frames (information)
- name: S-frame
  filter: llc.control.ftype == 2
  description: Filter for LLC S-frames (supervisory)
- name: U-frame
  filter: llc.control.ftype == 3
  description: Filter for LLC U-frames (unnumbered)
checks:
- name: llc_sap_not_configured
  severity: major
  message: 'LLC SAP not configured: DSAP {llc.dsap} not responding from {eth.dst}'
  description: llc.dsap value not in expected SAP list for the network
  condition: null
- name: llc_unauthorized_access
  severity: major
  message: 'LLC unauthorized access: unknown SSAP {llc.ssap} from {eth.src}'
  description: llc.ssap value not in expected SAP list
  condition: null
- name: llc_sap_disabled
  severity: minor
  message: 'LLC SAP disabled: DSAP {llc.dsap} indicates service not available'
  description: Repeated U-frames with no response from DSAP
  condition: null
- name: llc_invalid_type
  severity: major
  message: 'LLC invalid frame type: DSAP {llc.dsap} SSAP {llc.ssap} ftype {llc.control.ftype}'
  description: llc.control.ftype not in expected set (1, 2, 3)
  condition: null
- name: llc_no_response
  severity: major
  message: 'LLC no response: {count} frames from {eth.src} without reply from {eth.dst}'
  description: Multiple consecutive frames from same source without any response frames
  condition: null
