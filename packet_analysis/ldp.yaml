name: LDP Packet Analysis
description: LDP (Label Distribution Protocol) packet analysis for MPLS label distribution
  troubleshooting
protocol_key: ldp
display_filter: ldp
fields:
- label: Frame Number
  tshark_field: frame.number
  description: Packet sequence number in capture
- label: LDP Version
  tshark_field: ldp.hdr.version
  description: LDP version (usually 1)
- label: PDU Length
  tshark_field: ldp.hdr.pdu_len
  description: LDP PDU length
- label: LSR ID
  tshark_field: ldp.hdr.ldpid.lsr
  description: Label Switching Router ID (IPv4)
- label: Label Space ID
  tshark_field: ldp.hdr.ldpid.lsid
  description: Label Space ID (usually 0 for platform-wide)
- label: Unknown Message Bit
  tshark_field: ldp.msg.ubit
  description: Unknown message bit (U bit)
- label: Message Type
  tshark_field: ldp.msg.type
  description: 'LDP message type: 0x0001=Notification, 0x0100=Hello, 0x0400=Label
    Mapping, etc.'
- label: Message ID
  tshark_field: ldp.msg.id
  description: LDP message ID
- label: Hold Time
  tshark_field: ldp.msg.tlv.hello.hold
  description: Hello hold time in seconds
- label: Targeted Hello
  tshark_field: ldp.msg.tlv.hello.targeted
  description: Targeted hello flag
- label: IPv4 Transport Address
  tshark_field: ldp.msg.tlv.ipv4.taddr
  description: IPv4 transport address
- label: IPv6 Transport Address
  tshark_field: ldp.msg.tlv.ipv6.taddr
  description: IPv6 transport address
- label: Configuration Sequence Number
  tshark_field: ldp.msg.tlv.hello.cnf_seqno
  description: Configuration sequence number
- label: Label
  tshark_field: ldp.msg.tlv.generic.label
  description: Generic label value
- label: FEC Type
  tshark_field: ldp.msg.tlv.fec.type
  description: Forwarding Equivalence Class type
- label: FEC Prefix
  tshark_field: ldp.msg.tlv.fec.pfval
  description: FEC prefix value
filter_examples:
- name: LDP Hello
  filter: ldp.msg.type == 0x0100
  description: Filter for LDP Hello messages
- name: LDP Label Mapping
  filter: ldp.msg.type == 0x0400
  description: Filter for LDP Label Mapping messages
- name: LDP Label Withdraw
  filter: ldp.msg.type == 0x0401
  description: Filter for LDP Label Withdraw messages
- name: LDP Label Request
  filter: ldp.msg.type == 0x0402
  description: Filter for LDP Label Request messages
- name: LDP Notification
  filter: ldp.msg.type == 0x0001
  description: Filter for LDP Notification messages
- name: LDP Initialization
  filter: ldp.msg.type == 0x0200
  description: Filter for LDP Initialization messages
- name: Targeted LDP
  filter: ldp.msg.tlv.hello.targeted == 1
  description: Filter for targeted LDP sessions
checks:
- name: ldp_neighbor_timeout
  severity: major
  message: 'LDP neighbor timeout: no Hello from {ldp.msg.tlv.ipv4.taddr} within hold
    time'
  condition: No LDP Hello from neighbor within ldp.msg.tlv.hello.hold seconds
- name: ldp_session_down
  severity: critical
  message: 'LDP session down: notification {status_code} from {ldp.hdr.ldpid.lsr}'
  condition: LDP notification with fatal status
- name: ldp_label_withdraw
  severity: major
  message: 'LDP label withdraw: prefix {ldp.msg.tlv.fec.pfval} withdrawn by {ldp.hdr.ldpid.lsr}'
  condition: ldp.msg.type == 0x0401
- name: ldp_config_change
  severity: minor
  message: 'LDP configuration change: new sequence number {ldp.msg.tlv.hello.cnf_seqno}'
  condition: Different ldp.msg.tlv.hello.cnf_seqno from same neighbor
- name: ldp_transport_mismatch
  severity: major
  message: 'LDP transport address mismatch: configured {expected} but got {ldp.msg.tlv.ipv4.taddr}'
  condition: ldp.msg.tlv.ipv4.taddr differs from expected
